name: Deploy static site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Generate Supabase config
        env:
          SNAKE_SUPABASE_URL: ${{ secrets.SNAKE_SUPABASE_URL }}
          SNAKE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SNAKE_SUPABASE_PUBLISHABLE_KEY }}
          SNAKE_SUPABASE_AUTH_PATH: ${{ secrets.SNAKE_SUPABASE_AUTH_PATH }}
          SNAKE_SUPABASE_SCORES_PATH: ${{ secrets.SNAKE_SUPABASE_SCORES_PATH }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const config = {
            supabaseUrl: process.env.SNAKE_SUPABASE_URL || '',
            supabaseKey: process.env.SNAKE_SUPABASE_PUBLISHABLE_KEY || '',
            authPath: process.env.SNAKE_SUPABASE_AUTH_PATH || '',
            scoresPath: process.env.SNAKE_SUPABASE_SCORES_PATH || ''
          };
          const missing = Object.keys(config).filter((key) => !config[key]);
          if (missing.length) {
            throw new Error(`Missing GitHub Pages Supabase config: ${missing.join(', ')}`);
          }
          fs.writeFileSync(
            'somegame/js/config.js',
            `window.SnakeSupabaseConfig = ${JSON.stringify(config, null, 2)};\n`
          );
          NODE
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./somegame

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
